<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary SEO -->
    <title>Conecta Fisco - Legislação Trabalhista, Previdenciária, Contábil e Fiscal para Contadores</title>
    <meta name="description" content="Portal de legislação interpretada para contadores e profissionais de contabilidade. Atualizações de CLT, eSocial, ICMS, SPED, Simples Nacional, INSS, IR e obrigações fiscais com comentários práticos." />
    <meta name="keywords" content="legislação trabalhista, legislação contábil, legislação fiscal, legislação previdenciária, contabilidade, contador, eSocial, SPED, ICMS, ISS, IPI, PIS, COFINS, Simples Nacional, INSS, FGTS, imposto de renda, obrigações acessórias, reforma tributária, CLT, folha de pagamento, ECD, ECF, DARF, GFIP, DIRF, calculadora INSS, simulador tributário" />
    <meta name="author" content="Conecta Fisco" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://conectafisco.com.br" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://conectafisco.com.br" />
    <meta property="og:title" content="Conecta Fisco - Legislação Interpretada para Contadores" />
    <meta property="og:description" content="Portal completo de legislação trabalhista, previdenciária, contábil e fiscal com comentários práticos, simuladores e ferramentas para profissionais de contabilidade." />
    <meta property="og:site_name" content="Conecta Fisco" />
    <meta property="og:locale" content="pt_BR" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Conecta Fisco - Legislação para Contadores" />
    <meta name="twitter:description" content="Legislação trabalhista, previdenciária, contábil e fiscal interpretada e aplicável. Ferramentas, simuladores e atualizações para contadores." />
    
    <!-- Geo / Regional -->
    <meta name="geo.region" content="BR" />
    <meta name="geo.placename" content="Brasil" />
    <meta name="content-language" content="pt-BR" />
    
    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Conecta Fisco",
      "url": "https://conectafisco.com.br",
      "description": "Portal de legislação interpretada e aplicável para profissionais de contabilidade",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "contato@conectafisco.com",
        "contactType": "customer support",
        "availableLanguage": "Portuguese"
      }
    }
    </script>
    
    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Conecta Fisco",
      "url": "https://conectafisco.com.br",
      "description": "Portal de legislação trabalhista, previdenciária, contábil e fiscal para contadores",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://conectafisco.com.br/busca-avancada?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- Structured Data - BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {"@type": "ListItem", "position": 1, "name": "Início", "item": "https://conectafisco.com.br"},
        {"@type": "ListItem", "position": 2, "name": "Legislação Trabalhista", "item": "https://conectafisco.com.br/legislacao/trabalhista"},
        {"@type": "ListItem", "position": 3, "name": "Legislação Previdenciária", "item": "https://conectafisco.com.br/legislacao/previdenciaria"},
        {"@type": "ListItem", "position": 4, "name": "Legislação Contábil", "item": "https://conectafisco.com.br/legislacao/contabil"},
        {"@type": "ListItem", "position": 5, "name": "Legislação Fiscal", "item": "https://conectafisco.com.br/legislacao/fiscal"},
        {"@type": "ListItem", "position": 6, "name": "Ferramentas e Simuladores", "item": "https://conectafisco.com.br/ferramentas-uteis"},
        {"@type": "ListItem", "position": 7, "name": "Calendário Fiscal", "item": "https://conectafisco.com.br/calendario-fiscal"}
      ]
    }
    </script>
    
    <!-- Structured Data - FAQPage for rich snippets -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "O que é o Conecta Fisco?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O Conecta Fisco é um portal de legislação interpretada e aplicável voltado para contadores e profissionais de contabilidade. Oferece atualizações legais com comentários técnicos, ferramentas, simuladores e orientações práticas nas áreas trabalhista, previdenciária, contábil e fiscal."
          }
        },
        {
          "@type": "Question",
          "name": "Quais áreas da legislação o Conecta Fisco cobre?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O portal cobre legislação trabalhista (CLT, eSocial, folha de pagamento), previdenciária (INSS, FGTS, contribuições), contábil (NBC, ECD, escrituração) e fiscal (ICMS, ISS, IPI, PIS/COFINS, Simples Nacional, SPED, reforma tributária)."
          }
        },
        {
          "@type": "Question",
          "name": "O Conecta Fisco tem ferramentas e calculadoras para contadores?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sim. O portal oferece calculadoras de INSS, simuladores do Simples Nacional, calculadora de custo de funcionário, alíquotas por estado e consulta de códigos de receita, entre outras ferramentas práticas para o dia a dia contábil."
          }
        },
        {
          "@type": "Question",
          "name": "Como funciona o calendário fiscal do Conecta Fisco?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "O calendário fiscal apresenta os principais prazos de entrega e vencimentos de obrigações fiscais, trabalhistas e previdenciárias, com filtros por categoria e alertas de urgência para ajudar contadores a não perder nenhum prazo."
          }
        }
      ]
    }
    </script>

    <!-- Structured Data - ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Conecta Fisco",
      "url": "https://conectafisco.com.br",
      "description": "Soluções fiscais completas para contadores - legislação interpretada, ferramentas e simuladores",
      "areaServed": {
        "@type": "Country",
        "name": "Brasil"
      },
      "serviceType": ["Consultoria Contábil", "Legislação Tributária", "Ferramentas Fiscais", "Cursos para Contadores"],
      "audience": {
        "@type": "Audience",
        "audienceType": "Contadores, Escritórios de Contabilidade, Estudantes de Contabilidade"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
